version: 1

# Ejemplos few-shot curados para L3. Se seleccionan por sector/subsector en runtime.

examples:
  - id: transporte_vialidad_estructurante
    sector: TRANSPORTE
    subsector: TRANSPORTE URBANO, Y VIALIDAD PEATONAL
    tags: [vialidad, estructurante, desambiguacion]
    proyecto: >
      Construcción de 3 obras viales de conexión entre eje Balmaceda y zonas de expansión urbana.
      Incluye prolongación de acceso, pavimentación de avenida estructurante y mejoramiento de eje
      con 600m de longitud para conectar sectores residenciales con el centro urbano.
    respuesta:
      analisis: Obra vial urbana estructurante que conecta sectores con el eje principal de la ciudad.
      evidencia:
        - "obras viales de conexión entre el Eje Balmaceda"
        - "pavimentación de avenida estructurante"
        - "conexión directa de residentes hacia Balmaceda"
      candidatos_descartados:
        - tipo_id: TRANSPORTE.TRANSPORTE_URBANO_Y_VIALIDAD_PEATONAL.VIALIDAD_LOCAL
          motivo: Las obras conectan ejes troncales/estructurantes, no calles locales ni pasajes.
        - tipo_id: TRANSPORTE.TRANSPORTE_URBANO_Y_VIALIDAD_PEATONAL.CICLOVIAS_URBANAS
          motivo: No hay mención de ciclovías ni transporte ciclista.
      tipo_id: TRANSPORTE.TRANSPORTE_URBANO_Y_VIALIDAD_PEATONAL.VIALIDAD_URBANA_ESTRUCTURANTE
      confianza: 0.88
      razonamiento: >
        El proyecto describe obras de conexión entre ejes urbanos principales (Balmaceda),
        típico de vialidad estructurante, no vialidad local ni ciclovías.

  - id: hidricos_agua_potable_vs_alcantarillado
    sector: RECURSOS HIDRICOS
    subsector: AGUA POTABLE
    tags: [agua_potable, desambiguacion]
    proyecto: >
      Ampliación de red de agua potable para dotar de drinking water a 500 viviendas del sector
      Los Alamos. Incluye 2,5 km de tubería de agua potable, válvulas y arranques domiciliarios.
    respuesta:
      analisis: Extensión de red de agua potable para nuevas viviendas.
      evidencia:
        - "Ampliación de red de agua potable"
        - "tubería de agua potable, válvulas y arranques domiciliarios"
      candidatos_descartados:
        - tipo_id: RECURSOS_HIDRICOS.AGUA_POTABLE.RED_DE_ALCANTARILLADO
          motivo: No hay alcantarillado ni aguas servidas; solo agua potable.
      tipo_id: RECURSOS_HIDRICOS.AGUA_POTABLE.AMPLIACION_RED_AGUA_POTABLE
      confianza: 0.92
      razonamiento: Obra de ampliación de red de agua potable con tuberías y arranques domiciliarios.

  - id: deportes_sintetico_vs_pasto
    sector: DEPORTES
    subsector: DEPORTE RECREATIVO
    tags: [deportes, pares_confusos]
    proyecto: >
      Construcción cancha de fútbol con carpeta de pasto sintético estándar para uso comunitario
      en club deportivo municipal. Incluye iluminación perimetral.
    respuesta:
      analisis: Construcción de cancha de fútbol recreativa con carpeta sintética.
      evidencia:
        - "cancha de fútbol con carpeta de pasto sintético"
        - "uso comunitario en club deportivo municipal"
      candidatos_descartados:
        - tipo_id: DEPORTE.RECREATIVO.CANCHA_DE_FUTBOL_CARPETA_PASTO_ESTANDAR
          motivo: El texto especifica pasto sintético, no pasto natural.
      tipo_id: DEPORTE.RECREATIVO.CANCHA_DE_FUTBOL_CARPETA_SINTETICA_ESTANDAR
      confianza: 0.95
      razonamiento: Carpeta sintética explícita distingue de cancha de pasto natural.

  - id: compuesto_jardin_sala_cuna
    sector: EDUCACION
    subsector: EDUCACION PREBASICA
    tags: [compuesto, y]
    proyecto: >
      Construcción de jardín infantil y sala cuna para 120 párvulos en sector vulnerable.
      El proyecto contempla ambos espacios en un mismo recinto educativo prebásico.
    respuesta:
      analisis: Obra educativa prebásica que incluye jardín infantil Y sala cuna.
      evidencia:
        - "Construcción de jardín infantil y sala cuna"
        - "ambos espacios en un mismo recinto educativo prebásico"
      candidatos_descartados:
        - tipo_id: EDUCACION.EDUCACION_PREBASICA.JARDIN_INFANTIL
          motivo: Solo jardín infantil; el proyecto también incluye sala cuna.
        - tipo_id: EDUCACION.EDUCACION_PREBASICA.SALA_CUNA
          motivo: Solo sala cuna; el proyecto también incluye jardín infantil.
      tipo_id: EDUCACION.EDUCACION_PREBASICA.JARDIN_INFANTIL_Y_SALA_CUNA
      confianza: 0.90
      razonamiento: Texto evidencia ambas componentes; corresponde al tipo compuesto.

  - id: ambiguo_texto_generico
    sector: null
    subsector: null
    tags: [global, null, baja_evidencia]
    proyecto: >
      Mejoramiento infraestructura comunal. Proyecto de apoyo al desarrollo local.
    respuesta:
      analisis: Texto demasiado genérico para determinar un tipo específico de obra.
      evidencia:
        - "Mejoramiento infraestructura comunal"
        - "apoyo al desarrollo local"
      candidatos_descartados: []
      tipo_id: null
      confianza: 0.25
      razonamiento: >
        Sin detalle de la obra (vialidad, agua, educación, etc.) no es posible clasificar
        con confianza dentro de una taxonomía específica.

  - id: l1_l2_desacuerdo
    sector: null
    subsector: null
    tags: [global, l1_l2]
    proyecto: >
      Reposición de colectores de aguas lluvias y construcción de laguna de retención
      en sector urbano para reducir inundaciones.
    respuesta:
      analisis: Obra de drenaje de aguas lluvias con colector y laguna de retención.
      evidencia:
        - "Reposición de colectores de aguas lluvias"
        - "construcción de laguna de retención"
      candidatos_descartados:
        - tipo_id: RECURSOS_HIDRICOS.AGUAS_LLUVIAS.LAGUNA_O_TRANQUE_DE_RETENCION
          motivo: Hay colector Y laguna; es tipo compuesto, no solo laguna.
      tipo_id: RECURSOS_HIDRICOS.AGUAS_LLUVIAS.COLECTOR_AGUAS_LLUVIAS_Y_LAGUNA_DE_RETENCION
      confianza: 0.87
      razonamiento: >
        Evidencia ambas componentes (colector + laguna). Aplica tipo compuesto aunque L1/L2
        pudieran sugerir solo uno de los subtipos.

  - id: hidricos_casetas_agua_potable
    sector: RECURSOS HIDRICOS
    subsector: EVACUACION DISPOSICION FINAL AGUAS SERVIDAS
    tags: [casetas, agua_potable, desambiguacion]
    proyecto: >
      Construcción Casetas Sanitarias Sector Pueblo Seco. Construcción de 95 casetas
      sanitarias con baño y cocina; mejoramiento del sistema de agua potable (estanque
      V=100m3) y extensiones de red a calles sin servicio. No contempla planta de tratamiento.
    respuesta:
      analisis: Soluciones sanitarias domiciliarias con componente de agua potable, sin planta.
      evidencia:
        - "95 casetas sanitarias: con baño y cocina"
        - "mejoramiento del sistema de agua potable"
        - "extensiones de red"
      candidatos_descartados:
        - tipo_id: RECURSOS_HIDRICOS.EVACUACION_DISPOSICION_FINAL_AGUAS_SERVIDAS.CASETAS_SANITARIASALCANTARILLADOPLANTA_DE_TRATAMIENTO
          motivo: No hay planta de tratamiento; solo casetas y agua potable.
        - tipo_id: RECURSOS_HIDRICOS.EVACUACION_DISPOSICION_FINAL_AGUAS_SERVIDAS.RED_DE_ALCANTARILLADO_Y_PLANTA_TRATAMIENTO_AGUAS_SERVIDAS
          motivo: Obra centrada en casetas domiciliarias, no red/planta a escala de localidad.
      tipo_id: RECURSOS_HIDRICOS.EVACUACION_DISPOSICION_FINAL_AGUAS_SERVIDAS.CASETAS_SANITARIASALCANTARILLADOAGUA_POTABLE
      confianza: 0.9
      razonamiento: >
        Componentes evidentes = casetas + agua potable. Sin planta ni energía → tipo
        CASETAS …/AGUA POTABLE.

  - id: hidricos_casetas_con_energia
    sector: RECURSOS HIDRICOS
    subsector: EVACUACION DISPOSICION FINAL AGUAS SERVIDAS
    tags: [casetas, energia, desambiguacion]
    proyecto: >
      Construcción Soluciones Sanitarias Palquibudi. 50 soluciones sanitarias completas,
      137 SS.HH. intermedias, 10 arranques de agua potable y 6 empalmes eléctricos;
      relleno de 48 pozos negros.
    respuesta:
      analisis: Soluciones sanitarias con agua potable y empalmes eléctricos.
      evidencia:
        - "soluciones sanitarias completas"
        - "arranques de agua potable"
        - "empalmes electricos"
      candidatos_descartados:
        - tipo_id: RECURSOS_HIDRICOS.EVACUACION_DISPOSICION_FINAL_AGUAS_SERVIDAS.CASETAS_SANITARIASALCANTARILLADOAGUA_POTABLE
          motivo: Hay empalmes eléctricos explícitos → corresponde variante con ENERGIA.
        - tipo_id: RECURSOS_HIDRICOS.EVACUACION_DISPOSICION_FINAL_AGUAS_SERVIDAS.RED_DE_ALCANTARILLADO_Y_PLANTA_TRATAMIENTO_AGUAS_SERVIDAS
          motivo: No es red/planta comunal; son soluciones sanitarias prediales.
      tipo_id: RECURSOS_HIDRICOS.EVACUACION_DISPOSICION_FINAL_AGUAS_SERVIDAS.CASETAS_SANITARIAS_ALCANTARILLADOAGUA_POTABLEENERGIA
      confianza: 0.9
      razonamiento: >
        Casetas + agua potable + energía (empalmes) → CASETAS …/AGUA POTABLE/ENERGIA.

  - id: transporte_ruta_con_codigo
    sector: TRANSPORTE
    subsector: TRANSPORTE INTERURBANO
    tags: [ruta, camino, desambiguacion]
    proyecto: >
      Mejoramiento Camino Tres Esquinas-las Trancas, Rol K-175. Pavimentación de la
      ruta K-175 en 18 km, trazado en planta y alzado, ancho mínimo 7 m y bermas 1,5 m.
    respuesta:
      analisis: Pavimentación de una ruta interurbana con código oficial K-175.
      evidencia:
        - "Rol K-175"
        - "pavimentacion de la ruta k-175"
        - "18 km"
      candidatos_descartados:
        - tipo_id: TRANSPORTE.TRANSPORTE_INTERURBANO.CAMINO_BASICO_INTERMEDIO
          motivo: Tiene designación oficial de ruta (K-175); no es camino vecinal sin código.
      tipo_id: TRANSPORTE.TRANSPORTE_INTERURBANO.RUTA
      confianza: 0.92
      razonamiento: >
        Código/rol de ruta oficial (K-175) → RUTA, aunque el nombre diga "Camino".

  - id: educacion_basica_sin_kinder
    sector: EDUCACION
    subsector: EDUCACION BASICA Y MEDIA
    tags: [escuela, compuesto, desambiguacion]
    proyecto: >
      Reposición Escuela Básica G-123. Construcción de pabellones de aulas, casino y
      multicancha para enseñanza básica. No contempla salas de párvulos ni kinder.
    respuesta:
      analisis: Infraestructura de escuela básica sin componente prebásica.
      evidencia:
        - "Escuela Básica"
        - "enseñanza básica"
        - "No contempla salas de párvulos ni kinder"
      candidatos_descartados:
        - tipo_id: EDUCACION.EDUCACION_BASICA_Y_MEDIA.ESCUELA_BASICA_MAS_KINDER_YO_PREKINDER
          motivo: No hay evidencia de kinder/prekindér; solo escuela básica.
      tipo_id: EDUCACION.EDUCACION_BASICA_Y_MEDIA.ESCUELA_BASICA
      confianza: 0.9
      razonamiento: Sin evidencia de prebásica → ESCUELA BASICA simple, no el compuesto.
