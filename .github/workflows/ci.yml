name: CI

on:
  push:
  pull_request:

jobs:
  python:
    name: Tests, ruff, mypy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: repo

      # sni-commons se consume por path editable (../sni-commons): el runner
      # necesita el repo hermano. ECOSYSTEM_PAT = fine-grained PAT read-only
      # sobre sni-commons (secrets del repo); github.token basta si es público.
      - name: Checkout sni-commons (dep por path)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sni-commons
          token: ${{ secrets.ECOSYSTEM_PAT || github.token }}
          path: sni-commons

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "repo/uv.lock"

      - name: Sync dependencies
        working-directory: repo
        run: uv sync --extra dev

      # PT-8 hecho (2026-06-09): pytest + ruff/mypy strict bloqueantes.
      - name: Pytest
        working-directory: repo
        run: uv run pytest

      - name: Ruff
        working-directory: repo
        run: uv run ruff check src scripts tests

      - name: mypy (--strict)
        working-directory: repo
        run: uv run mypy src
